<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>指标学习 - 股票学习笔记本</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0a0f1a;
            color: #f1f5f9;
            min-height: 100vh;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 0;
            border-bottom: 1px solid #1e293b;
            margin-bottom: 24px;
        }
        .header h1 { font-size: 24px; font-weight: 600; }
        .nav { display: flex; gap: 24px; }
        .nav a {
            color: #94a3b8;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.2s;
        }
        .nav a:hover, .nav a.active { color: #f1f5f9; }
        .btn {
            background: #3b82f6;
            border: none;
            border-radius: 8px;
            padding: 10px 20px;
            color: white;
            font-size: 14px;
            cursor: pointer;
        }
        .btn:hover { background: #2563eb; }
        .card {
            background: #111827;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .card-title { font-size: 18px; font-weight: 600; }
        .card-actions { display: flex; gap: 8px; }
        .card-actions button {
            background: #1e293b;
            border: none;
            border-radius: 6px;
            padding: 6px 12px;
            color: #94a3b8;
            font-size: 12px;
            cursor: pointer;
        }
        .card-actions button:hover { background: #334155; color: #f1f5f9; }
        .card-content { color: #cbd5e1; line-height: 1.6; font-size: 14px; }
        .card-content .label { color: #9ca3af; font-size: 11px; margin-top: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
        .empty { color: #9ca3af; text-align: center; padding: 60px 0; font-size: 14px; }
        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            justify-content: center;
            align-items: center;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: #111827;
            border-radius: 12px;
            padding: 24px;
            width: 500px;
            max-width: 90%;
        }
        .modal-title { font-size: 18px; font-weight: 600; margin-bottom: 16px; }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; font-size: 13px; color: #94a3b8; margin-bottom: 4px; }
        .form-group input, .form-group textarea {
            width: 100%;
            background: #0a0f1a;
            border: 1px solid #1e293b;
            border-radius: 6px;
            padding: 10px;
            color: #f1f5f9;
            font-size: 14px;
        }
        .form-group textarea { min-height: 80px; resize: vertical; }
        .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
        .btn-cancel { background: #334155; }
        .btn-cancel:hover { background: #475569; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>股票学习笔记本</h1>
            <nav class="nav">
                <a href="/">概览</a>
                <a href="/learning" class="active">指标学习</a>
                <a href="/portfolio">持仓管理</a>
            </nav>
        </div>

        <div style="margin-bottom: 20px;">
            <button class="btn" onclick="openModal()">+ 新增指标</button>
        </div>

        <div id="notesList">
            <div class="empty">暂无指标笔记</div>
        </div>
    </div>

    <!-- Modal -->
    <div class="modal" id="noteModal">
        <div class="modal-content">
            <div class="modal-title" id="modalTitle">新增指标</div>
            <input type="hidden" id="noteId">
            <div class="form-group">
                <label>指标名称</label>
                <input type="text" id="indicatorName" placeholder="如: MACD">
            </div>
            <div class="form-group">
                <label>含义</label>
                <textarea id="meaning" placeholder="指标的含义..."></textarea>
            </div>
            <div class="form-group">
                <label>用法</label>
                <textarea id="usage" placeholder="如何使用这个指标..."></textarea>
            </div>
            <div class="modal-actions">
                <button class="btn btn-cancel" onclick="closeModal()">取消</button>
                <button class="btn" onclick="saveNote()">保存</button>
            </div>
        </div>
    </div>

    <script>
        let notes = [];

        async function loadNotes() {
            const resp = await fetch('/api/notes');
            const result = await resp.json();
            notes = result.data || [];
            renderNotes();
        }

        function renderNotes() {
            const container = document.getElementById('notesList');
            if (notes.length === 0) {
                container.innerHTML = '<div class="empty">暂无指标笔记</div>';
                return;
            }
            container.innerHTML = notes.map(n => `
                <div class="card">
                    <div class="card-header">
                        <div class="card-title">${escapeHtml(n.indicator_name)}</div>
                        <div class="card-actions">
                            <button onclick="editNote(${n.id})">编辑</button>
                            <button onclick="deleteNote(${n.id})">删除</button>
                        </div>
                    </div>
                    <div class="card-content">
                        <div><span class="label">含义:</span> ${escapeHtml(n.meaning || '')}</div>
                        <div><span class="label">用法:</span> ${escapeHtml(n.usage || '')}</div>
                    </div>
                </div>
            `).join('');
        }

        function openModal(id = null) {
            document.getElementById('noteModal').classList.add('active');
            document.getElementById('modalTitle').textContent = id ? '编辑指标' : '新增指标';
            if (id) {
                const note = notes.find(n => n.id === id);
                document.getElementById('noteId').value = id;
                document.getElementById('indicatorName').value = note.indicator_name;
                document.getElementById('meaning').value = note.meaning || '';
                document.getElementById('usage').value = note.usage || '';
            } else {
                document.getElementById('noteId').value = '';
                document.getElementById('indicatorName').value = '';
                document.getElementById('meaning').value = '';
                document.getElementById('usage').value = '';
            }
        }

        function closeModal() {
            document.getElementById('noteModal').classList.remove('active');
        }

        function editNote(id) { openModal(id); }

        async function saveNote() {
            const id = document.getElementById('noteId').value;
            const data = {
                indicator_name: document.getElementById('indicatorName').value,
                meaning: document.getElementById('meaning').value,
                usage: document.getElementById('usage').value
            };
            if (!data.indicator_name) { alert('请输入指标名称'); return; }

            if (id) {
                await fetch(`/api/notes/${id}`, { method: 'PUT', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data) });
            } else {
                await fetch('/api/notes', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data) });
            }
            closeModal();
            loadNotes();
            alert(id ? '指标已更新' : '指标已添加');
        }

        async function deleteNote(id) {
            if (!confirm('确定删除?')) return;
            await fetch(`/api/notes/${id}`, { method: 'DELETE' });
            loadNotes();
            alert('指标已删除');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        loadNotes();
    </script>
</body>
</html>
