<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>持仓管理 - 股票学习笔记本</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0a0f1a;
            color: #f1f5f9;
            min-height: 100vh;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 0;
            border-bottom: 1px solid #1e293b;
            margin-bottom: 24px;
        }
        .header h1 { font-size: 24px; font-weight: 600; }
        .nav { display: flex; gap: 24px; }
        .nav a {
            color: #94a3b8;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.2s;
        }
        .nav a:hover, .nav a.active { color: #f1f5f9; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
        .card {
            background: #111827;
            border-radius: 12px;
            padding: 20px;
        }
        .card-title {
            font-size: 12px;
            color: #9ca3af;
            margin-bottom: 16px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .btn {
            background: #3b82f6;
            border: none;
            border-radius: 6px;
            padding: 8px 14px;
            color: white;
            font-size: 13px;
            cursor: pointer;
        }
        .btn:hover { background: #2563eb; }
        .stock-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #1e293b;
            cursor: pointer;
        }
        .stock-item:last-child { border-bottom: none; }
        .stock-item:hover { background: #1e293b; margin: 0 -12px; padding: 12px; border-radius: 8px; }
        .stock-code { font-weight: 600; font-size: 15px; }
        .stock-name { color: #9ca3af; font-size: 13px; }
        .stock-info { font-size: 12px; color: #9ca3af; }
        .stock-actions { display: flex; gap: 4px; }
        .stock-actions button {
            background: #1e293b;
            border: none;
            border-radius: 4px;
            padding: 4px 8px;
            color: #94a3b8;
            font-size: 11px;
            cursor: pointer;
        }
        .stock-actions button:hover { background: #334155; color: #f1f5f9; }
        .empty { color: #9ca3af; text-align: center; padding: 40px 0; font-size: 13px; }
        .search-box { display: flex; gap: 8px; margin-bottom: 12px; }
        .search-box input { flex: 1; background: #0a0f1a; border: 1px solid #1e293b; border-radius: 6px; padding: 8px 12px; color: #f1f5f9; font-size: 13px; }
        .search-results { max-height: 200px; overflow-y: auto; margin-top: 8px; }
        .search-result-item { padding: 8px 12px; cursor: pointer; border-radius: 6px; font-size: 13px; }
        .search-result-item:hover { background: #1e293b; }
        .search-result-item .code { font-weight: 600; color: #60a5fa; }
        .search-result-item .name { color: #9ca3af; margin-left: 8px; }
        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            justify-content: center;
            align-items: center;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: #111827;
            border-radius: 12px;
            padding: 24px;
            width: 400px;
            max-width: 90%;
        }
        .modal-title { font-size: 18px; font-weight: 600; margin-bottom: 16px; }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; font-size: 13px; color: #94a3b8; margin-bottom: 4px; }
        .form-group input {
            width: 100%;
            background: #0a0f1a;
            border: 1px solid #1e293b;
            border-radius: 6px;
            padding: 10px;
            color: #f1f5f9;
            font-size: 14px;
        }
        .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
        .btn-cancel { background: #334155; }
        .btn-cancel:hover { background: #475569; }
        .btn-delete { background: #ef4444; }
        .btn-delete:hover { background: #dc2626; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>股票学习笔记本</h1>
            <nav class="nav">
                <a href="/">概览</a>
                <a href="/learning">指标学习</a>
                <a href="/portfolio" class="active">持仓管理</a>
            </nav>
        </div>

        <div class="grid">
            <div class="card">
                <div class="card-title">
                    <span>持仓</span>
                    <button class="btn" onclick="openPortfolioModal()">+ 添加持仓</button>
                </div>
                <div id="portfolioList">
                    <div class="empty">暂无持仓</div>
                </div>
            </div>

            <div class="card">
                <div class="card-title">
                    <span>自选股</span>
                    <button class="btn" onclick="openWatchlistModal()">+ 添加自选</button>
                </div>
                <div id="watchlistList">
                    <div class="empty">暂无自选股</div>
                </div>
            </div>
        </div>
    </div>

    <!-- 持仓 Modal -->
    <div class="modal" id="portfolioModal">
        <div class="modal-content">
            <div class="modal-title" id="portfolioModalTitle">添加持仓</div>
            <input type="hidden" id="portfolioId">
            <div class="form-group">
                <label>股票代码</label>
                <input type="text" id="stockCode" placeholder="如: 600487" oninput="searchStock('portfolio')">
                <div class="search-results" id="portfolioSearchResults"></div>
            </div>
            <div class="form-group">
                <label>股票名称</label>
                <input type="text" id="stockName" placeholder="如: 亨通光电">
            </div>
            <div class="form-group">
                <label>持仓数量</label>
                <input type="number" id="shares" placeholder="0">
            </div>
            <div class="form-group">
                <label>成本价</label>
                <input type="number" id="costPrice" placeholder="0.00" step="0.01">
            </div>
            <div class="form-group">
                <label>备注</label>
                <input type="text" id="notes" placeholder="可选">
            </div>
            <div class="modal-actions">
                <button class="btn btn-cancel" onclick="closePortfolioModal()">取消</button>
                <button class="btn" onclick="savePortfolio()">保存</button>
            </div>
        </div>
    </div>

    <!-- 自选股 Modal -->
    <div class="modal" id="watchlistModal">
        <div class="modal-content">
            <div class="modal-title">添加自选股</div>
            <div class="form-group">
                <label>股票代码</label>
                <input type="text" id="watchStockCode" placeholder="如: 600487" oninput="searchStock('watchlist')">
                <div class="search-results" id="watchlistSearchResults"></div>
            </div>
            <div class="form-group">
                <label>股票名称</label>
                <input type="text" id="watchStockName" placeholder="如: 亨通光电">
            </div>
            <div class="modal-actions">
                <button class="btn btn-cancel" onclick="closeWatchlistModal()">取消</button>
                <button class="btn" onclick="saveWatchlist()">保存</button>
            </div>
        </div>
    </div>

    <script>
        let portfolios = [];
        let watchlists = [];

        async function loadData() {
            const [pResp, wResp] = await Promise.all([
                fetch('/api/portfolios'),
                fetch('/api/watchlists')
            ]);
            portfolios = (await pResp.json()).data || [];
            watchlists = (await wResp.json()).data || [];
            renderPortfolios();
            renderWatchlists();
        }

        function renderPortfolios() {
            const container = document.getElementById('portfolioList');
            if (portfolios.length === 0) {
                container.innerHTML = '<div class="empty">暂无持仓</div>';
                return;
            }
            container.innerHTML = portfolios.map(p => `
                <div class="stock-item" onclick="location.href='/stock/${p.stock_code}'">
                    <div>
                        <div class="stock-code">${p.stock_code}</div>
                        <div class="stock-name">${p.stock_name || '未知'}</div>
                        <div class="stock-info">${p.shares} 股 @ ¥${p.cost_price}</div>
                    </div>
                    <div class="stock-actions">
                        <button onclick="event.stopPropagation(); editPortfolio(${p.id})">编辑</button>
                        <button onclick="event.stopPropagation(); deletePortfolio(${p.id})">删除</button>
                    </div>
                </div>
            `).join('');
        }

        function renderWatchlists() {
            const container = document.getElementById('watchlistList');
            if (watchlists.length === 0) {
                container.innerHTML = '<div class="empty">暂无自选股</div>';
                return;
            }
            container.innerHTML = watchlists.map(w => `
                <div class="stock-item" onclick="location.href='/stock/${w.stock_code}'">
                    <div>
                        <div class="stock-code">${w.stock_code}</div>
                        <div class="stock-name">${w.stock_name || '未知'}</div>
                    </div>
                    <div class="stock-actions">
                        <button onclick="event.stopPropagation(); deleteWatchlist(${w.id})">删除</button>
                    </div>
                </div>
            `).join('');
        }

        function openPortfolioModal(id = null) {
            document.getElementById('portfolioModal').classList.add('active');
            document.getElementById('portfolioModalTitle').textContent = id ? '编辑持仓' : '添加持仓';
            if (id) {
                const p = portfolios.find(x => x.id === id);
                document.getElementById('portfolioId').value = id;
                document.getElementById('stockCode').value = p.stock_code;
                document.getElementById('stockName').value = p.stock_name || '';
                document.getElementById('shares').value = p.shares;
                document.getElementById('costPrice').value = p.cost_price;
                document.getElementById('notes').value = p.notes || '';
            } else {
                document.getElementById('portfolioId').value = '';
                document.getElementById('stockCode').value = '';
                document.getElementById('stockName').value = '';
                document.getElementById('shares').value = '';
                document.getElementById('costPrice').value = '';
                document.getElementById('notes').value = '';
            }
        }

        function closePortfolioModal() {
            document.getElementById('portfolioModal').classList.remove('active');
        }

        function editPortfolio(id) { openPortfolioModal(id); }

        async function savePortfolio() {
            const id = document.getElementById('portfolioId').value;
            const data = {
                stock_code: document.getElementById('stockCode').value,
                stock_name: document.getElementById('stockName').value,
                shares: parseFloat(document.getElementById('shares').value) || 0,
                cost_price: parseFloat(document.getElementById('costPrice').value) || 0,
                notes: document.getElementById('notes').value
            };
            if (!data.stock_code) { alert('请输入股票代码'); return; }

            if (id) {
                await fetch(`/api/portfolios/${id}`, { method: 'PUT', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data) });
            } else {
                await fetch('/api/portfolios', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data) });
            }
            closePortfolioModal();
            loadData();
        }

        async function deletePortfolio(id) {
            if (!confirm('确定删除?')) return;
            await fetch(`/api/portfolios/${id}`, { method: 'DELETE' });
            loadData();
        }

        function openWatchlistModal() {
            document.getElementById('watchlistModal').classList.add('active');
            document.getElementById('watchStockCode').value = '';
            document.getElementById('watchStockName').value = '';
        }

        function closeWatchlistModal() {
            document.getElementById('watchlistModal').classList.remove('active');
        }

        async function saveWatchlist() {
            const data = {
                stock_code: document.getElementById('watchStockCode').value,
                stock_name: document.getElementById('watchStockName').value
            };
            if (!data.stock_code) { alert('请输入股票代码'); return; }
            await fetch('/api/watchlists', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data) });
            closeWatchlistModal();
            loadData();
        }

        async function deleteWatchlist(id) {
            if (!confirm('确定删除?')) return;
            await fetch(`/api/watchlists/${id}`, { method: 'DELETE' });
            loadData();
        }

        let searchTimeout;
        async function searchStock(type) {
            clearTimeout(searchTimeout);
            const codeInput = type === 'portfolio' ? 'stockCode' : 'watchStockCode';
            const nameInput = type === 'portfolio' ? 'stockName' : 'watchStockName';
            const resultsId = type === 'portfolio' ? 'portfolioSearchResults' : 'watchlistSearchResults';
            const keyword = document.getElementById(codeInput).value.trim();
            if (keyword.length < 2) { document.getElementById(resultsId).innerHTML = ''; return; }
            searchTimeout = setTimeout(async () => {
                try {
                    const resp = await fetch(`/api/search?keyword=${encodeURIComponent(keyword)}`);
                    const result = await resp.json();
                    const stocks = result.data || [];
                    const container = document.getElementById(resultsId);
                    if (stocks.length === 0) { container.innerHTML = '<div style="padding:8px;color:#9ca3af;font-size:12px">未找到股票</div>'; return; }
                    container.innerHTML = stocks.map(s => `<div class="search-result-item" onclick="selectStock('${type}','${s.code}','${s.name}')"><span class="code">${s.code}</span><span class="name">${s.name}</span></div>`).join('');
                } catch (e) { document.getElementById(resultsId).innerHTML = ''; }
            }, 300);
        }

        function selectStock(type, code, name) {
            if (type === 'portfolio') { document.getElementById('stockCode').value = code; document.getElementById('stockName').value = name; document.getElementById('portfolioSearchResults').innerHTML = ''; }
            else { document.getElementById('watchStockCode').value = code; document.getElementById('watchStockName').value = name; document.getElementById('watchlistSearchResults').innerHTML = ''; }
        }

        loadData();
    </script>
</body>
</html>
